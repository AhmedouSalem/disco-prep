databaseChangeLog:
  - changeSet:
      id: 001-create-supplier-table
      author: ahmedou
      changes:
        - createTable:
            tableName: suppliers
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(120)
                  constraints:
                    nullable: false
              - column:
                  name: country
                  type: VARCHAR(80)
                  constraints:
                    nullable: false

              - column:
                  name: city
                  type: VARCHAR(80)

              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false